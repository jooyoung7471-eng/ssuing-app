<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<title>쓰잉 · Interactive Prototype</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="tokens.js"></script>
<style>
  html, body { margin: 0; padding: 0; font-family: 'Pretendard', -apple-system, sans-serif; background: #0F1013; color: #fff; }
  body { min-height: 100vh; overflow: hidden; }
  *, *::before, *::after { box-sizing: border-box; }
  button { font-family: inherit; }

  /* Scene transitions */
  .scene-enter { animation: sceneIn 280ms cubic-bezier(0.22, 1, 0.36, 1); }
  @keyframes sceneIn {
    0% { opacity: 0; transform: translateY(12px) scale(0.985); }
    100% { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* Hotspot pulse (shown when "hotspots" toggle is ON) */
  .hotspot { position: absolute; cursor: pointer; border-radius: 8px; }
  .hotspot.show { background: rgba(74, 144, 217, 0.25); box-shadow: 0 0 0 2px rgba(74, 144, 217, 0.7); animation: hsPulse 1.5s ease-in-out infinite; }
  @keyframes hsPulse {
    0%, 100% { box-shadow: 0 0 0 2px rgba(74, 144, 217, 0.7), 0 0 0 0 rgba(74, 144, 217, 0.4); }
    50% { box-shadow: 0 0 0 2px rgba(74, 144, 217, 0.9), 0 0 0 12px rgba(74, 144, 217, 0); }
  }

  .scroll-track::-webkit-scrollbar { width: 6px; }
  .scroll-track::-webkit-scrollbar-thumb { background: #2A2F3B; border-radius: 3px; }
  .scroll-track::-webkit-scrollbar-track { background: transparent; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="screens-original.jsx"></script>
<script type="text/babel" src="screens-c-v2.jsx"></script>
<script type="text/babel" src="screens-c-v3.jsx"></script>
<script type="text/babel" src="prototype-flow.jsx"></script>

<script type="text/babel">
// ─── PROTOTYPE SHELL ────────────────────────────────────────────────
// Renders a single iPhone frame at real size with an overlay of clickable
// hotspots (Figma-style). Chrome consists of a left sidebar (flow index)
// and right sidebar (controls + mini progress).

const { FLOW, NODES } = window.PrototypeFlow;
// Merge order matters: v2 overrides v1 for Home/Onboarding (the refined versions),
// but v1 supplies Login + Terms which weren't redone in v2.
const ALL_SCREENS = { ...window.OrigScreens, ...window.CV2Screens, ...window.CV3Screens };

function Shell() {
  const [current, setCurrent] = React.useState(() => {
    return localStorage.getItem('ssuing_proto_current') || FLOW[0];
  });
  const [history, setHistory] = React.useState([current]);
  const [showHotspots, setShowHotspots] = React.useState(true);
  const [sceneKey, setSceneKey] = React.useState(0);

  React.useEffect(() => {
    localStorage.setItem('ssuing_proto_current', current);
  }, [current]);

  const go = (target) => {
    if (!target || !NODES[target]) return;
    setHistory(h => [...h, target]);
    setCurrent(target);
    setSceneKey(k => k + 1);
  };
  const back = () => {
    if (history.length <= 1) return;
    const next = history.slice(0, -1);
    setHistory(next);
    setCurrent(next[next.length - 1]);
    setSceneKey(k => k + 1);
  };
  const reset = () => {
    setCurrent(FLOW[0]);
    setHistory([FLOW[0]]);
    setSceneKey(k => k + 1);
  };

  const node = NODES[current];
  const ScreenComp = ALL_SCREENS[node.screen];
  const progressIdx = FLOW.indexOf(current);
  const progress = progressIdx >= 0 ? (progressIdx + 1) / FLOW.length : 0;

  return (
    <div style={{
      display: 'grid',
      gridTemplateColumns: '240px 1fr 300px',
      height: '100vh',
      background: 'radial-gradient(ellipse at top, #1a1d24 0%, #0F1013 60%)',
    }}>
      {/* LEFT SIDEBAR — flow nodes */}
      <aside style={{
        borderRight: '1px solid #1F232C',
        padding: '20px 0',
        display: 'flex', flexDirection: 'column',
        overflow: 'hidden',
      }}>
        <div style={{ padding: '0 20px 16px' }}>
          <div style={{ fontSize: 10, fontWeight: 800, color: '#6B7280', letterSpacing: 1.5 }}>SSUING PROTOTYPE</div>
          <div style={{ fontSize: 18, fontWeight: 800, letterSpacing: -0.4, marginTop: 4 }}>핵심 플로우</div>
          <div style={{ fontSize: 11, color: '#9CA3AF', marginTop: 3 }}>
            온보딩 → 학습 → 리워드
          </div>
        </div>

        <div className="scroll-track" style={{ flex: 1, overflow: 'auto', padding: '0 8px' }}>
          {FLOW.map((k, i) => {
            const n = NODES[k];
            const active = k === current;
            const visited = history.includes(k);
            return (
              <button key={k} onClick={() => go(k)} style={{
                display: 'flex', alignItems: 'center', gap: 10,
                width: '100%', padding: '8px 12px', marginBottom: 2,
                background: active ? '#1F232C' : 'transparent',
                border: 'none', borderRadius: 8, cursor: 'pointer',
                textAlign: 'left', color: active ? '#fff' : (visited ? '#9CA3AF' : '#6B7280'),
              }}>
                <span style={{
                  width: 20, height: 20, borderRadius: '50%',
                  background: active ? '#4A90D9' : (visited ? '#2A2F3B' : 'transparent'),
                  border: visited ? 'none' : '1px solid #374151',
                  display: 'flex', alignItems: 'center', justifyContent: 'center',
                  fontSize: 10, fontWeight: 800, color: active ? '#fff' : '#6B7280',
                  flexShrink: 0,
                }}>{visited && !active ? '✓' : (i + 1)}</span>
                <span style={{ fontSize: 12, fontWeight: active ? 700 : 500, flex: 1, minWidth: 0, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
                  {n.label}
                </span>
              </button>
            );
          })}
        </div>

        <div style={{ padding: '14px 20px 0', borderTop: '1px solid #1F232C', marginTop: 8 }}>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 6 }}>
            <span style={{ fontSize: 10, fontWeight: 700, color: '#9CA3AF', letterSpacing: 0.6 }}>플로우 진행</span>
            <span style={{ fontSize: 10, fontWeight: 700, color: '#4A90D9' }}>{Math.round(progress * 100)}%</span>
          </div>
          <div style={{ height: 4, background: '#1F232C', borderRadius: 2 }}>
            <div style={{ height: '100%', width: (progress * 100) + '%', background: 'linear-gradient(90deg, #4A90D9, #7C5CFA)', borderRadius: 2, transition: 'width 280ms' }}/>
          </div>
        </div>
      </aside>

      {/* CENTER STAGE */}
      <main style={{
        display: 'flex', flexDirection: 'column',
        alignItems: 'center', justifyContent: 'center',
        position: 'relative', padding: 20,
      }}>
        {/* top toolbar */}
        <div style={{
          position: 'absolute', top: 20, left: 20, right: 20,
          display: 'flex', alignItems: 'center', gap: 10,
        }}>
          <IconBtn onClick={back} disabled={history.length <= 1} label="←" title="뒤로"/>
          <IconBtn onClick={reset} label="↻" title="처음으로"/>
          <div style={{
            padding: '6px 12px', borderRadius: 8, background: '#1F232C',
            fontSize: 11, fontWeight: 700, color: '#9CA3AF', letterSpacing: 0.3,
          }}>{node.label}</div>
          <div style={{ flex: 1 }}/>
          <button onClick={() => setShowHotspots(s => !s)} style={{
            padding: '6px 12px', borderRadius: 8,
            background: showHotspots ? '#4A90D9' : '#1F232C',
            color: '#fff', border: 'none', cursor: 'pointer',
            fontSize: 11, fontWeight: 700, letterSpacing: 0.3,
          }}>
            {showHotspots ? '🎯 핫스팟 표시' : '🎯 핫스팟 숨김'}
          </button>
          <a href="index.html" style={{
            padding: '6px 12px', borderRadius: 8, background: '#1F232C',
            color: '#9CA3AF', textDecoration: 'none', fontSize: 11, fontWeight: 700,
          }}>← 캔버스로</a>
        </div>

        {/* Phone + hotspots stage */}
        <div key={sceneKey} className="scene-enter" style={{ position: 'relative' }}>
          <IOSDevice width={402} height={874} dark={node.dark}>
            <div style={{ paddingTop: 4 }}>
              {ScreenComp ? <ScreenComp/> : <div style={{ padding: 40, color: '#6B7280' }}>Screen not found: {node.screen}</div>}
            </div>
          </IOSDevice>
          {/* hotspot overlay */}
          <div style={{
            position: 'absolute', top: 0, left: 0, width: 402, height: 874,
            pointerEvents: 'none',
          }}>
            {(node.hotspots || []).map((h, i) => (
              <div
                key={i}
                className={'hotspot' + (showHotspots ? ' show' : '')}
                onClick={() => go(h.to)}
                style={{
                  left: h.x, top: h.y, width: h.w, height: h.h,
                  pointerEvents: 'auto',
                }}
                title={`→ ${NODES[h.to]?.label || h.to}`}
              />
            ))}
          </div>
        </div>

        {/* bottom status */}
        <div style={{
          position: 'absolute', bottom: 20, left: 0, right: 0, textAlign: 'center',
          fontSize: 11, color: '#6B7280', fontWeight: 500,
        }}>
          {node.hotspots && node.hotspots.length > 0
            ? `${node.hotspots.length}개 핫스팟 · 파란 영역을 탭해 진행`
            : '이 화면은 플로우의 끝입니다 · ↻로 처음부터'}
        </div>
      </main>

      {/* RIGHT SIDEBAR — context */}
      <aside style={{
        borderLeft: '1px solid #1F232C',
        padding: '20px', overflow: 'auto',
        display: 'flex', flexDirection: 'column', gap: 16,
      }}>
        <div>
          <div style={{ fontSize: 10, fontWeight: 800, color: '#6B7280', letterSpacing: 1.5, marginBottom: 8 }}>CURRENT SCENE</div>
          <div style={{ fontSize: 20, fontWeight: 800, letterSpacing: -0.5, marginBottom: 4 }}>{node.label}</div>
          <div style={{ fontSize: 12, color: '#9CA3AF', lineHeight: 1.5 }}>{node.desc || '이 화면의 동작을 확인해보세요.'}</div>
        </div>

        {node.hotspots && node.hotspots.length > 0 && (
          <div style={{ padding: 14, background: '#181B22', borderRadius: 12, border: '1px solid #1F232C' }}>
            <div style={{ fontSize: 10, fontWeight: 800, color: '#6B7280', letterSpacing: 1.2, marginBottom: 8 }}>
              다음으로 이동 가능
            </div>
            {node.hotspots.map((h, i) => (
              <button key={i} onClick={() => go(h.to)} style={{
                display: 'flex', alignItems: 'center', gap: 10,
                width: '100%', padding: '8px 0',
                background: 'transparent', border: 'none', cursor: 'pointer',
                color: '#9CA3AF', textAlign: 'left',
                borderBottom: i < node.hotspots.length - 1 ? '1px solid #1F232C' : 'none',
              }}>
                <span style={{
                  width: 6, height: 6, borderRadius: '50%', background: '#4A90D9', flexShrink: 0,
                }}/>
                <span style={{ flex: 1, fontSize: 12, fontWeight: 600 }}>
                  {h.label || NODES[h.to]?.label}
                </span>
                <span style={{ color: '#4A90D9', fontSize: 14 }}>→</span>
              </button>
            ))}
          </div>
        )}

        <div style={{ padding: 14, background: '#181B22', borderRadius: 12, border: '1px solid #1F232C' }}>
          <div style={{ fontSize: 10, fontWeight: 800, color: '#6B7280', letterSpacing: 1.2, marginBottom: 8 }}>
            방문 이력 ({history.length})
          </div>
          <div style={{ fontSize: 11, color: '#9CA3AF', lineHeight: 1.7 }}>
            {history.slice(-6).map((h, i) => (
              <div key={i} style={{
                opacity: i === history.slice(-6).length - 1 ? 1 : 0.6,
                fontWeight: i === history.slice(-6).length - 1 ? 700 : 500,
                color: i === history.slice(-6).length - 1 ? '#fff' : 'inherit',
              }}>
                {history.slice(-6).length > 1 && i > 0 && '↓ '}{NODES[h]?.label}
              </div>
            ))}
          </div>
        </div>

        <div style={{ marginTop: 'auto', paddingTop: 16, borderTop: '1px solid #1F232C' }}>
          <div style={{ fontSize: 10, color: '#6B7280', lineHeight: 1.5 }}>
            <b style={{ color: '#9CA3AF' }}>사용법</b><br/>
            · 폰 화면의 파란 영역을 탭<br/>
            · ← 뒤로, ↻ 처음으로<br/>
            · 왼쪽에서 원하는 화면으로 점프
          </div>
        </div>
      </aside>
    </div>
  );
}

function IconBtn({ onClick, disabled, label, title }) {
  return (
    <button onClick={onClick} disabled={disabled} title={title} style={{
      width: 32, height: 32, borderRadius: 8,
      background: '#1F232C', color: disabled ? '#4B5563' : '#9CA3AF',
      border: 'none', cursor: disabled ? 'not-allowed' : 'pointer',
      fontSize: 16, fontWeight: 700,
      display: 'flex', alignItems: 'center', justifyContent: 'center',
    }}>{label}</button>
  );
}

// Wait for deps
(function waitMount() {
  if (window.OrigScreens && window.CV2Screens && window.CV3Screens && window.IOSDevice && window.PrototypeFlow) {
    ReactDOM.createRoot(document.getElementById('root')).render(<Shell/>);
  } else {
    setTimeout(waitMount, 50);
  }
})();
</script>
</body>
</html>
